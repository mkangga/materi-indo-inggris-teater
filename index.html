document.addEventListener('DOMContentLoaded', () => {
    const mainNav = document.getElementById('main-nav');
    const subNav = document.getElementById('sub-nav');
    const contentArea = document.getElementById('content-area');
    const subNavTitle = document.getElementById('sub-nav-title');

    function renderSubNav(subject) {
        subNav.innerHTML = '';
        const topics = contentData[subject];
        let subjectTitle = '';
        if (subject === 'bahasaInggris') subjectTitle = 'Bahasa Inggris';
        else if (subject === 'bahasaIndonesia') subjectTitle = 'Bahasa Indonesia';
        else if (subject === 'seniTeater') subjectTitle = 'Seni Teater';

        subNavTitle.textContent = `Topik ${subjectTitle}`;

        topics.forEach(topic => {
            const button = document.createElement('button');
            button.dataset.id = topic.id;
            button.textContent = topic.title;
            button.className = 'sub-nav-btn w-full text-left p-3 rounded-lg hover:bg-slate-100 transition';
            subNav.appendChild(button);
        });
    }

    function renderContent(topicId) {
        let content = 'Pilih topik untuk dilihat.';
        for (const subject in contentData) {
            const found = contentData[subject].find(t => t.id === topicId);
            if (found) {
                content = found.content;
                break;
            }
        }
        contentArea.innerHTML = `<div class="content-card">${content}</div>`;
        attachInteractiveListeners();
    }

    function attachInteractiveListeners() {
        const diagram1 = document.getElementById('interactive-diagram-1');
        if (diagram1) {
            const detailBox = document.getElementById('interactive-detail-1');
            diagram1.addEventListener('click', e => {
                const target = e.target.closest('.interactive-element');
                if (target) {
                    const detailId = target.dataset.id;
                    detailBox.innerHTML = interactiveDetails[detailId] || 'Detail tidak ditemukan.';
                    diagram1.querySelectorAll('.interactive-element').forEach(el => el.classList.remove('selected'));
                    target.classList.add('selected');
                }
            });
        }
        const diagram2 = document.getElementById('interactive-diagram-2');
        if (diagram2) {
            const detailBox = document.getElementById('interactive-detail-2');
            diagram2.addEventListener('click', e => {
                const target = e.target.closest('.interactive-element');
                if (target) {
                    const detailId = target.dataset.id;
                    detailBox.innerHTML = interactiveDetails[detailId] || 'Detail tidak ditemukan.';
                    diagram2.querySelectorAll('.interactive-element').forEach(el => el.classList.remove('selected'));
                    target.classList.add('selected');
                }
            });
        }
    }

    mainNav.addEventListener('click', e => {
        if (e.target.tagName === 'BUTTON') {
            const subject = e.target.dataset.subject;
            mainNav.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');

            renderSubNav(subject);
            // Auto-click first topic of the new subject
            if (subNav.firstChild) {
                subNav.firstChild.click();
            }
        }
    });

    subNav.addEventListener('click', e => {
        if (e.target.tagName === 'BUTTON') {
            const topicId = e.target.dataset.id;
            subNav.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            renderContent(topicId);
        }
    });

    // Initial load
    mainNav.querySelector('button[data-subject="bahasaInggris"]').click();
});
</script>

</body>
</html>
